version: '3.8'

services:
  vote:
    build:
      context: ./vote
    image: abdelrahmana890/voting-app-vote:latest
    ports:
      - "5000:80"
    networks:
      - front-tier
      - back-tier

  result:
    image: abdelrahmana890/voting-app-result:latest
    ports:
      - "5001:80"
    networks:
      - front-tier
      - back-tier

  worker:
    build:
      context: ./worker
    image: abdelrahmana890/voting-app-worker:latest
    networks:
      - back-tier

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    volumes:
      - "db-data:/var/lib/postgresql/data"
    networks:
      - back-tier

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - back-tier

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - back-tier

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - back-tier
      - front-tier

volumes:
  db-data:

networks:
  front-tier:
  back-tier:
