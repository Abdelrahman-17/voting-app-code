version: '3.8'

services:
  vote:
    image: abdelrahmana890/voting-app-vote:latest
    ports:
      - "5000:80"
    networks:
      - frontend-net
      - backend-net
    restart: always

  result:
    image: abdelrahmana890/voting-app-result:latest
    ports:
      - "5001:80"
    networks:
      - frontend-net
      - backend-net
    restart: always

  worker:
    build: ./worker
    networks:
      - backend-net
    restart: always

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - backend-net
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend-net
    restart: always

volumes:
  db-data:

networks:
  frontend-net:
    external: true
    name: enterprise-devops-platform_frontend-net
  backend-net:
    external: true
    name: enterprise-devops-platform_backend-net
